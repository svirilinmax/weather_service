<!DOCTYPE html>
<html>
<head>
    <title>Weather Service</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1, h2 { color: #333; }
        input, select, button { margin: 5px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f2f2f2; }
        .cached { background: #e8f5e9; }
        .badge { background: #4caf50; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; display: inline-block; }
        .api-badge { background: #2196f3; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; display: inline-block; }
        .weather-result { background: #e3f2fd; padding: 15px; border-radius: 8px; margin: 20px 0; }
        .filter-bar { background: #fff3e0; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather Service</h1>

        <div class="weather-result">
            <h2>Get Weather</h2>
            <input type="text" id="city" placeholder="City name" value="" style="width: 200px;">
            <select id="units">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
            </select>
            <button onclick="getWeather()">🔍 Get Weather</button>
            <div id="weatherResult"></div>
        </div>

        <div class="filter-bar">
            <h2> History</h2>
            <div>
                <input type="text" id="filterCity" placeholder="Filter by city" style="width: 150px;">
                <input type="date" id="filterDateFrom">
                <span>to</span>
                <input type="date" id="filterDateTo">
                <button onclick="loadHistory()">🔍 Filter</button>
                <button onclick="exportCSV()">📥 Export CSV</button>
            </div>
        </div>
        <div id="history"></div>
    </div>
    <script>
        async function getWeather() {
            const city = document.getElementById('city').value;
            const units = document.getElementById('units').value;

            try {
                const response = await fetch(`/api/v1/weather?city=${encodeURIComponent(city)}&units=${units}`);
                const data = await response.json();

                const weatherResult = document.getElementById('weatherResult');
                weatherResult.innerHTML = '';

                if (!response.ok) {
                    throw new Error(data.detail || 'Ошибка запроса');
                }

                const hr = document.createElement('hr');
                const title = document.createElement('h3');
                title.textContent = data.city;

                const temp = document.createElement('p');
                temp.innerHTML = `<strong>Temperature:</strong> ${data.temperature}°${data.units}`;

                const desc = document.createElement('p');
                desc.innerHTML = `<strong>Description:</strong> ${data.description}`;

                const humidity = document.createElement('p');
                humidity.innerHTML = `<strong>Humidity:</strong> ${data.humidity}%`;

                const source = document.createElement('p');
                const badge = data.is_cached ?
                    '<span class="badge">📦 From Cache</span>' :
                    '<span class="api-badge">🌍 From API</span>';
                source.innerHTML = `<strong>Source:</strong> ${badge}`;

                const time = document.createElement('p');
                time.innerHTML = `<strong>Time (UTC0):</strong> ${new Date(data.timestamp).toLocaleString()}`;

                weatherResult.appendChild(hr);
                weatherResult.appendChild(title);
                weatherResult.appendChild(temp);
                weatherResult.appendChild(desc);
                weatherResult.appendChild(humidity);
                weatherResult.appendChild(source);
                weatherResult.appendChild(time);

                loadHistory();
            } catch (error) {
                document.getElementById('weatherResult').innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
            }
        }

        async function loadHistory() {
            const city = document.getElementById('filterCity').value;
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;

            let url = '/api/v1/weather/history?size=10';
            if (city) url += `&city=${encodeURIComponent(city)}`;
            if (dateFrom) url += `&date_from=${dateFrom}T00:00:00`;
            if (dateTo) url += `&date_to=${dateTo}T23:59:59`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                const historyDiv = document.getElementById('history');
                historyDiv.innerHTML = '';

                if (data.items.length === 0) {
                    historyDiv.innerHTML = '<p>No history found.</p>';
                    return;
                }

                const table = document.createElement('table');
                const thead = document.createElement('thead');
                thead.innerHTML = `
                    <tr>
                        <th>City</th>
                        <th>Temperature</th>
                        <th>Description</th>
                        <th>Humidity</th>
                        <th>Source</th>
                        <th>Time</th>
                    </tr>
                `;
                table.appendChild(thead);

                const tbody = document.createElement('tbody');
                for (const item of data.items) {
                    const row = tbody.insertRow();
                    if (item.is_cached) row.className = 'cached';

                    row.insertCell(0).textContent = item.city;
                    row.insertCell(1).textContent = `${item.temperature}°${item.units}`;
                    row.insertCell(2).textContent = item.description;
                    row.insertCell(3).textContent = `${item.humidity}%`;
                    row.insertCell(4).textContent = item.is_cached ? '📦 Cache' : '🌍 API';
                    row.insertCell(5).textContent = new Date(item.timestamp).toLocaleString();
                }
                table.appendChild(tbody);

                historyDiv.appendChild(table);

                const pagination = document.createElement('p');
                pagination.textContent = `Page ${data.page} of ${Math.ceil(data.total / data.size)} (Total: ${data.total} requests)`;
                historyDiv.appendChild(pagination);
            } catch (error) {
                document.getElementById('history').innerHTML = `<p style="color:red">Error loading history: ${error.message}</p>`;
            }
        }

        async function exportCSV() {
            const city = document.getElementById('filterCity').value;
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;

            let url = '/api/v1/weather/export';
            const params = [];
            if (city) params.push(`city=${encodeURIComponent(city)}`);
            if (dateFrom) params.push(`date_from=${dateFrom}T00:00:00`);
            if (dateTo) params.push(`date_to=${dateTo}T23:59:59`);
            if (params.length) url += '?' + params.join('&');

            window.open(url, '_blank');
        }

        loadHistory();
    </script>
</body>
</html>
